<!-- Applications Section: Staff & YouTuber -->
    <section id="applications">
      <h2 class="section-title">📝 APPLY FOR RANKS & ROLES</h2>
      <div class="grid-container">
        
        <!-- YouTuber Rank Application -->
        <div class="card" style="border-color: #ff0000; text-align: left;">
          <h3 style="color: #ff0000; text-align: center;">🎥 Apply for YouTuber Rank</h3>
          <p style="color: var(--text-muted); font-size: 0.85rem; text-align: center;">Requirements: 100+ Subs & 1 Video/Stream on Storm Steal Network!</p>
          
          <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
            <input type="text" id="ytIgn" placeholder="Your Minecraft IGN">
            <input type="text" id="ytChannel" placeholder="YouTube / Twitch Channel Link">
            <input type="number" id="ytSubs" placeholder="Subscriber / Follower Count">
            <input type="text" id="ytVideo" placeholder="Link to Video on Storm Steal">
            <button onclick="submitYtApp()" class="btn-primary" style="background: #ff0000; justify-content: center;">
              🔴 Apply for YT Rank
            </button>
          </div>
        </div>

        <!-- Admin & Staff Application -->
        <div class="card" style="border-color: var(--primary); text-align: left;">
          <h3 style="color: var(--primary); text-align: center;">🛡️ Apply for Admin / Staff</h3>
          <p style="color: var(--text-muted); font-size: 0.85rem; text-align: center;">Requirements: Active in-game & Discord, 14+ Age</p>
          
          <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
            <input type="text" id="staffIgn" placeholder="Your Minecraft IGN">
            <input type="number" id="staffAge" placeholder="Your Age">
            <select id="staffRole">
              <option value="Admin Rank">🛡️ Admin Rank</option>
              <option value="Moderator">⚔️ Moderator</option>
              <option value="Helper">🤝 Helper</option>
              <option value="Builder">🏗️ Builder</option>
            </select>
            <textarea id="staffExperience" rows="2" placeholder="Previous Moderation/Admin Experience?"></textarea>
            <textarea id="staffReason" rows="2" placeholder="Why should we select you as Admin/Staff?"></textarea>
            <button onclick="submitStaffApp()" class="btn-primary" style="justify-content: center;">
              📩 Submit Staff Application
            </button>
          </div>
        </div>

      </div>
    </section>
